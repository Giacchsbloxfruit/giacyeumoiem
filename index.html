<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gift Code Gaming</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    overflow: hidden;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌊 Sóng neon */
.wave {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(0,255,255,0.2), transparent 70%),
                radial-gradient(circle at 30% 30%, rgba(255,0,255,0.2), transparent 70%),
                radial-gradient(circle at 70% 70%, rgba(0,255,100,0.2), transparent 70%);
    animation: move 12s linear infinite;
    filter: blur(60px);
}

.wave:nth-child(2) {
    animation-duration: 18s;
    transform: rotate(180deg);
}

.wave:nth-child(3) {
    animation-duration: 25s;
    transform: rotate(90deg);
}

@keyframes move {
    0% { transform: translate(-20%, -20%) rotate(0deg); }
    50% { transform: translate(20%, 20%) rotate(180deg); }
    100% { transform: translate(-20%, -20%) rotate(360deg); }
}

/* Box */
.box {
    position: relative;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px cyan;
    width: 320px;
    backdrop-filter: blur(10px);
}

h1 {
    color: cyan;
    text-shadow: 0 0 15px cyan;
}

input {
    width: 80%;
    padding: 10px;
    margin: 15px 0;
    border: none;
    border-radius: 5px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background: cyan;
    cursor: pointer;
}

#message {
    margin-top: 10px;
    font-weight: bold;
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: black;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 20px lime;
}
</style>

</head>
<body>

<!-- 🌊 nền sóng -->
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<!-- 🎵 NHẠC -->
<audio id="bgm" loop>
    <source src="https://raw.githubusercontent.com/Giacchsbloxfruit/giacyeumoiem/main/Nhac.mp3" type="audio/mpeg">
</audio>

<div class="box">
    <h1>🎮 NHẬP GIFT CODE</h1>
    <input type="text" id="codeInput" placeholder="Nhập code...">
    <br>
    <button onclick="checkCode()">Xác nhận</button>
    <div id="message"></div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>🎉 Chúc mừng!</h2>
        <p>Bạn nhận được 1 phiếu ăn sinh nhật của Minh Giác!</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
// 🎵 Auto play
window.onload = function() {
    let audio = document.getElementById("bgm");
    audio.play().catch(() => {
        document.body.addEventListener("click", () => {
            audio.play();
        }, { once: true });
    });
};

// check code
function checkCode() {
    let code = document.getElementById("codeInput").value;
    let message = document.getElementById("message");

    if (code === "Giacdz") {
        message.innerHTML = "";
        document.getElementById("popup").style.display = "flex";
    } else {
        message.style.color = "red";
        message.innerHTML = "❌ Code không hợp lệ!";
    }
}

// đóng popup
function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
