<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gift Code Gaming - Chill Version</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    overflow: hidden; /* Để hiệu ứng rơi không làm hiện thanh cuộn */
    background: black; /* Nền tối để màu neon nổi bật */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌊 Hiệu ứng nền sóng ảo diệu (Fix lỗi góc đen) */
.wave-bg {
    position: fixed;
    top: -100%;
    left: -100%;
    width: 300%;
    height: 300%;
    background: radial-gradient(circle at 50% 50%, rgba(0,255,255,0.15), transparent 100%),
                radial-gradient(circle at 20% 30%, rgba(255,0,255,0.15), transparent 100%),
                radial-gradient(circle at 80% 70%, rgba(0,255,100,0.15), transparent 100%);
    animation: moveWave 15s linear infinite;
    filter: blur(80px);
    z-index: -1;
}

@keyframes moveWave {
    0% { transform: rotate(0deg) translate(-5%, -5%); }
    50% { transform: rotate(180deg) translate(5%, 5%); }
    100% { transform: rotate(360deg) translate(-5%, -5%); }
}

/* 🎮 Khung Box chính */
.box {
    position: relative;
    z-index: 10;
    background: rgba(0, 0, 0, 0.75);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
    width: 350px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

h1 {
    color: cyan;
    text-shadow: 0 0 15px cyan;
    margin-bottom: 25px;
    font-size: 24px;
}

/* 🌈 Input với viền 7 màu chuyển động (RGB Border) */
.input-wrapper {
    position: relative;
    padding: 3px; /* Độ dày của viền */
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400% 400%;
    border-radius: 12px;
    animation: rgbBorder 5s linear infinite;
    margin: 20px 0;
}

@keyframes rgbBorder {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    background: #111;
    color: white;
    outline: none;
    box-sizing: border-box;
}

button {
    padding: 12px 30px;
    border: none;
    border-radius: 8px;
    background: cyan;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    text-transform: uppercase;
}

button:hover {
    box-shadow: 0 0 20px cyan;
    transform: scale(1.05);
}

#message {
    margin-top: 15px;
    font-weight: bold;
    min-height: 20px;
}

/* ❤️ Hiệu ứng rơi chill chill */
.fall-item {
    position: fixed;
    top: -50px;
    font-size: 24px;
    user-select: none;
    pointer-events: none;
    z-index: 1;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-content {
    background: #000;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 40px lime;
    color: white;
    border: 2px solid lime;
    transform: scale(0.8);
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes popIn {
    to { transform: scale(1); }
}
</style>

</head>
<body>

<div class="wave-bg"></div>

<audio id="bgm" loop>
    <source src="https://raw.githubusercontent.com/Giacchsbloxfruit/giacyeumoiem/main/Nhac.mp3" type="audio/mpeg">
</audio>

<div class="box">
    <h1>🎮 NHẬP GIFT CODE</h1>
    <div class="input-wrapper">
        <input type="text" id="codeInput" placeholder="Nhập mã code tại đây...">
    </div>
    <button onclick="checkCode()">Xác nhận ngay</button>
    <div id="message"></div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 style="color: lime;">🎉 Chúc mừng!</h2>
        <p>Bạn đã nhận được 1 phiếu ăn sinh nhật<br>của<b>Minh Giác</b>!</p>
        <button onclick="closePopup()" style="background: lime; color: black;">OK!</button>
    </div>
</div>

<script>
// 🎵 Xử lý nhạc và hiệu ứng rơi khi load
window.onload = function() {
    let audio = document.getElementById("bgm");
    audio.play().catch(() => {
        document.body.addEventListener("click", () => {
            audio.play();
        }, { once: true });
    });

    startFalling();
};

// Check code
function checkCode() {
    let code = document.getElementById("codeInput").value.trim();
    let message = document.getElementById("message");

    if (code === "Giacdz", "giacdz",) {
        message.innerHTML = "";
        document.getElementById("popup").style.display = "flex";
    } else {
        message.style.color = "#ff4d4d";
        message.innerHTML = "❌ Code không chính xác!";
        // Hiệu ứng rung nhẹ khi sai
        document.querySelector('.box').style.animation = "shake 0.3s ease";
        setTimeout(() => { document.querySelector('.box').style.animation = ""; }, 300);
    }
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// ❤️🍬 Hàm tạo hiệu ứng rơi chill
function startFalling() {
    const items = ["❤️", "💖", "🍬", "🍩", "✨", "🍭", "⚡"];
    setInterval(() => {
        const div = document.createElement('div');
        div.className = 'fall-item';
        div.innerHTML = items[Math.floor(Math.random() * items.length)];
        div.style.left = Math.random() * 100 + "vw";
        // Tốc độ rơi ngẫu nhiên từ 5s đến 10s cho chill
        div.style.animationDuration = (Math.random() * 5 + 5) + "s";
        div.style.opacity = Math.random();
        document.body.appendChild(div);

        // Xóa element sau khi rơi xong để tránh lag
        setTimeout(() => { div.remove(); }, 10000);
    }, 500);
}
</script>

<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}
</style>

</body>
</html>
