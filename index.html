<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: sans-serif;
}

/* video nền */
video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    filter: blur(10px) brightness(0.6);
    z-index:-1;
}

/* card */
.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border:3px solid white;
    box-shadow:0 0 40px white;
    text-align:center;
}

.avatar {
    width:100px;
    border-radius:50%;
}

h1,p {
    color:white;
    text-shadow:0 0 10px white;
}

a {
    color:white;
    margin:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
    <source src="https://files.catbox.moe/o1x0y6.mp4">
</video>

<div class="card" id="card">
    <img src="https://i.imgur.com/4M34hi2.png" class="avatar" id="avatar">
    <h1 id="name">Minh Giác</h1>
    <p id="bio">Dev | Student</p>

    <div>
        <a id="fb" href="#">Facebook</a>
        <a id="tt" href="#">TikTok</a>
        <a id="dc" href="#">Discord</a>
    </div>

    <button onclick="edit()">Chỉnh sửa</button>
</div>

<audio id="music"></audio>

<script>
// xoay card
const card = document.getElementById("card");
document.addEventListener("mousemove", e => {
    let x = (window.innerWidth/2 - e.pageX)/20;
    let y = (window.innerHeight/2 - e.pageY)/20;
    card.style.transform =
    `translate(-50%,-50%) rotateY(${x}deg) rotateX(${y}deg)`;
});

// nhạc
let songs = [
 "https://files.catbox.moe/3i2q0p.mp3"
];

let i=0;
let audio=document.getElementById("music");

function play(){
    audio.src=songs[i];
    audio.play();
}

document.body.addEventListener("click",play,{once:true});

// chỉnh sửa
function edit(){
    let name=prompt("Tên:");
    let bio=prompt("Bio:");
    let fb=prompt("Link FB:");
    let tt=prompt("Link TikTok:");
    let dc=prompt("Link Discord:");
    let ava=prompt("Link ảnh:");
    let vid=prompt("Link video:");

    if(name) document.getElementById("name").innerText=name;
    if(bio) document.getElementById("bio").innerText=bio;
    if(fb) document.getElementById("fb").href=fb;
    if(tt) document.getElementById("tt").href=tt;
    if(dc) document.getElementById("dc").href=dc;
    if(ava) document.getElementById("avatar").src=ava;
    if(vid) document.getElementById("bgVideo").src=vid;
}
</script>

</body>
</html>
