<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- icon đẹp -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#111;
}

/* video nền */
video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    filter: blur(4px) brightness(0.6) grayscale(40%);
    z-index:-2;
}

/* overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* card */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:360px;
    padding:30px;
    border-radius:25px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);

    border:2px solid rgba(255,255,255,0.8);
    box-shadow:0 0 30px rgba(255,255,255,0.4);

    text-align:center;
    transition: transform 0.1s;
}

/* avatar */
.avatar{
    width:110px;
    border-radius:50%;
    border:2px solid white;
    margin-bottom:10px;
}

/* text */
h1{
    color:white;
    text-shadow:0 0 10px white;
}

p{
    color:#ccc;
}

/* info box */
.box{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin:10px 0;
}

/* social */
.social a{
    margin:12px;
    font-size:24px;
    color:white;
    transition:0.2s;
}

.social a:hover{
    text-shadow:0 0 10px white;
}

/* skill */
.skills{
    margin-top:10px;
}

.skills span{
    display:inline-block;
    margin:5px;
    padding:5px 10px;
    border:1px solid white;
    border-radius:8px;
    font-size:12px;
    color:white;
}

/* nhạc */
audio{
    display:none;
}
</style>
</head>

<body>

<!-- video -->
<video autoplay muted loop id="bgVideo">
    <source src="https://files.catbox.moe/tj9qgh.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- card -->
<div class="card" id="card">

    <img src="https://i.imgur.com/4M34hi2.png" class="avatar">

    <h1>Minh Giác</h1>

    <div class="box">
        <p>Dev | Student | Chill</p>
    </div>

    <div class="box">
        <p><b>Năm sinh:</b> 2010</p>
        <p><b>Trường:</b> THPT Nguyễn Huệ</p>
    </div>

    <div class="box">
        <p><b>Discord:</b> tyheroday_12345</p>
        <p>"I MISS YOU"</p>
    </div>

    <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
    </div>

    <div class="social">
        <a href="https://facebook.com" target="_blank">
            <i class="fab fa-facebook"></i>
        </a>

        <a href="https://tiktok.com" target="_blank">
            <i class="fab fa-tiktok"></i>
        </a>

        <a href="https://discord.com" target="_blank">
            <i class="fab fa-discord"></i>
        </a>
    </div>

</div>

<!-- nhạc nền -->
<audio autoplay loop>
    <source src="https://files.catbox.moe/9gu9lj.mp3">
</audio>

<script>
// xoay card
const card = document.getElementById("card");

document.addEventListener("mousemove", e=>{
    let x = (e.pageX - window.innerWidth/2)/20;
    let y = (e.pageY - window.innerHeight/2)/20;

card.style.transform =
`translate(-50%,-50%) rotateY(${x}deg) rotateX(${-y}deg)`;
});
</script>

</body>
</html>
